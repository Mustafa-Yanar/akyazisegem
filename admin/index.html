<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e293b">
    <title>Akyazı SEGEM | Yönetim Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --koyu-mavi: #1e293b;
            --koyu-mavi-2: #334155;
            --canli-kirmizi: #ef4444;
            --kirmizi-koyu: #dc2626;
            --acik-gri: #f8fafc;
            --orta-gri: #e2e8f0;
            --metin-koyu: #334155;
            --metin-acik: #64748b;
            --beyaz: #ffffff;
            --yesil: #10b981;
            --golge: 0 4px 12px rgba(0,0,0,0.08);
            --golge-guclu: 0 12px 32px rgba(0,0,0,0.16);
            --gecis: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--acik-gri);
            color: var(--metin-koyu);
            min-height: 100vh;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        button { font-family: inherit; cursor: pointer; border: none; background: none; }
        input, textarea, select { font-family: inherit; font-size: 1rem; }

        /* ============ LOGIN EKRANI ============ */
        #login-screen {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #334155 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 24px; z-index: 1000;
        }

        #login-screen .login-card {
            width: 100%; max-width: 400px;
            background: var(--beyaz);
            border-radius: 20px;
            padding: 44px 32px;
            box-shadow: var(--golge-guclu);
            text-align: center;
        }

        #login-screen h1 {
            font-size: 2rem; font-weight: 900;
            color: var(--koyu-mavi);
            letter-spacing: -1px;
            margin-bottom: 8px;
        }
        #login-screen h1 span { color: var(--canli-kirmizi); }

        #login-screen .subtitle {
            color: var(--metin-acik);
            font-size: 0.95rem;
            margin-bottom: 32px;
            font-weight: 500;
        }

        #login-screen .login-btn {
            width: 100%;
            background: var(--canli-kirmizi);
            color: var(--beyaz);
            font-weight: 700;
            font-size: 1.05rem;
            padding: 16px;
            border-radius: 12px;
            transition: var(--gecis);
            box-shadow: 0 4px 14px rgba(239,68,68,0.35);
        }
        #login-screen .login-btn:hover { background: var(--kirmizi-koyu); transform: translateY(-2px); }
        #login-screen .login-btn:active { transform: translateY(0); }

        #login-screen .info {
            margin-top: 24px;
            font-size: 0.85rem;
            color: var(--metin-acik);
            line-height: 1.5;
        }

        /* ============ APP LAYOUT ============ */
        #app { display: none; }
        body.logged-in #app { display: block; }
        body.logged-in #login-screen { display: none; }

        /* ============ ÜST BAR ============ */
        .topbar {
            position: sticky; top: 0; z-index: 100;
            background: var(--koyu-mavi);
            color: var(--beyaz);
            height: 60px;
            display: flex; align-items: center;
            padding: 0 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .menu-toggle {
            color: var(--beyaz);
            font-size: 1.3rem;
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px;
            transition: var(--gecis);
        }
        .menu-toggle:hover { background: rgba(255,255,255,0.1); }
        .menu-toggle:active { background: rgba(255,255,255,0.2); }

        .topbar-title {
            flex: 1;
            text-align: center;
            font-weight: 800;
            font-size: 1.05rem;
            letter-spacing: -0.3px;
            margin-right: 44px; /* hamburger ile dengele */
        }

        /* ============ DRAWER (SOL MENÜ) ============ */
        .drawer-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s;
        }
        .drawer-overlay.active { opacity: 1; pointer-events: auto; }

        .drawer {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: 84%; max-width: 320px;
            background: var(--beyaz);
            z-index: 201;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
            box-shadow: 4px 0 24px rgba(0,0,0,0.15);
        }
        .drawer.active { transform: translateX(0); }

        .drawer-header {
            background: var(--koyu-mavi);
            color: var(--beyaz);
            padding: 24px 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .drawer-header .logo {
            font-size: 1.1rem; font-weight: 900; letter-spacing: -0.3px;
        }
        .drawer-header .logo span { color: var(--canli-kirmizi); }
        .drawer-close {
            color: var(--beyaz);
            width: 36px; height: 36px;
            border-radius: 8px;
            font-size: 1.1rem;
        }
        .drawer-close:hover { background: rgba(255,255,255,0.1); }

        .drawer-menu {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex; flex-direction: column;
        }

        .drawer-item {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 16px;
            border-radius: 12px;
            color: var(--metin-koyu);
            font-weight: 600;
            font-size: 0.98rem;
            cursor: pointer;
            transition: var(--gecis);
            text-align: left;
            width: 100%;
        }
        .drawer-item i { font-size: 1.1rem; width: 24px; text-align: center; color: var(--metin-acik); }
        .drawer-item:hover { background: var(--acik-gri); }
        .drawer-item:active { background: var(--orta-gri); }
        .drawer-item.active { background: rgba(239,68,68,0.1); color: var(--canli-kirmizi); }
        .drawer-item.active i { color: var(--canli-kirmizi); }

        .drawer-item.home {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: var(--koyu-mavi);
            color: var(--beyaz);
        }
        .drawer-item.home i { color: var(--beyaz); }
        .drawer-item.home:hover { background: var(--koyu-mavi-2); }
        .drawer-item.home.active { background: var(--canli-kirmizi); }
        .drawer-item.home.active i { color: var(--beyaz); }

        .drawer-divider {
            height: 1px;
            background: var(--orta-gri);
            margin: 8px 16px;
        }

        .drawer-spacer { flex: 1; min-height: 24px; }

        .drawer-item.logout {
            color: var(--canli-kirmizi);
            margin-bottom: 8px;
        }
        .drawer-item.logout i { color: var(--canli-kirmizi); }
        .drawer-item.logout:hover { background: rgba(239,68,68,0.1); }

        /* ============ ANA İÇERİK ============ */
        .content {
            padding: 20px 16px 40px;
            max-width: 720px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 24px;
        }
        .page-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--koyu-mavi);
            letter-spacing: -0.5px;
        }
        .page-header .subtitle {
            color: var(--metin-acik);
            font-size: 0.95rem;
            margin-top: 6px;
            font-weight: 500;
        }

        /* ============ KART ============ */
        .card {
            background: var(--beyaz);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--golge);
            margin-bottom: 16px;
            border: 1px solid var(--orta-gri);
        }
        .card-title {
            font-weight: 700;
            color: var(--koyu-mavi);
            font-size: 1rem;
            margin-bottom: 14px;
        }

        /* ============ FORM ELEMENTLERİ ============ */
        .form-group { margin-bottom: 16px; }
        .form-group:last-child { margin-bottom: 0; }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--metin-koyu);
            margin-bottom: 6px;
            letter-spacing: 0.2px;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 12px 14px;
            background: var(--beyaz);
            border: 1.5px solid var(--orta-gri);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--metin-koyu);
            transition: var(--gecis);
        }
        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--canli-kirmizi);
            box-shadow: 0 0 0 3px rgba(239,68,68,0.15);
        }
        .form-textarea {
            resize: vertical;
            min-height: 80px;
            font-family: 'SF Mono', Menlo, Consolas, monospace;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .form-textarea.address {
            font-family: inherit;
            font-size: 1rem;
            min-height: 70px;
        }

        .form-hint {
            font-size: 0.82rem;
            color: var(--metin-acik);
            margin-top: 6px;
            line-height: 1.5;
        }

        /* ============ BUTONLAR ============ */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: var(--gecis);
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--canli-kirmizi);
            color: var(--beyaz);
            box-shadow: 0 4px 12px rgba(239,68,68,0.3);
        }
        .btn-primary:hover { background: var(--kirmizi-koyu); transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-secondary {
            background: var(--orta-gri);
            color: var(--metin-koyu);
        }
        .btn-secondary:hover { background: #cbd5e1; }

        .btn-danger {
            background: var(--beyaz);
            color: var(--canli-kirmizi);
            border: 1.5px solid var(--canli-kirmizi);
        }
        .btn-danger:hover { background: var(--canli-kirmizi); color: var(--beyaz); }

        .btn-icon {
            width: 40px; height: 40px;
            padding: 0;
            border-radius: 8px;
            background: transparent;
            color: var(--metin-acik);
        }
        .btn-icon:hover { background: var(--acik-gri); color: var(--canli-kirmizi); }

        .btn-block { width: 100%; padding: 14px 24px; font-size: 1rem; }

        .save-btn-wrapper {
            position: sticky; bottom: 16px;
            margin-top: 24px;
            z-index: 50;
        }

        /* ============ ANASAYFA ============ */
        .home-hero {
            text-align: center;
            padding: 40px 20px 30px;
        }
        .home-hero h1 {
            font-size: 2rem; font-weight: 900;
            color: var(--koyu-mavi);
            letter-spacing: -1px;
        }
        .home-hero h1 span { color: var(--canli-kirmizi); }
        .home-hero .tag {
            color: var(--metin-acik);
            font-size: 0.95rem;
            margin-top: 8px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .home-welcome {
            background: var(--beyaz);
            border-radius: 16px;
            padding: 28px 22px;
            box-shadow: var(--golge);
            border: 1px solid var(--orta-gri);
            margin-top: 16px;
        }
        .home-welcome h2 {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--koyu-mavi);
            margin-bottom: 12px;
        }
        .home-welcome p {
            color: var(--metin-koyu);
            line-height: 1.7;
            font-size: 0.98rem;
        }
        .home-welcome ul {
            list-style: none;
            margin-top: 18px;
            border-top: 1px solid var(--orta-gri);
            padding-top: 18px;
        }
        .home-welcome ul li {
            padding: 10px 0;
            display: flex; align-items: center;
            gap: 12px;
            color: var(--metin-koyu);
            font-weight: 600;
            font-size: 0.95rem;
        }
        .home-welcome ul li i {
            width: 28px;
            font-size: 1.05rem;
            color: var(--canli-kirmizi);
        }

        /* ============ GALERİ POST LİSTESİ ============ */
        .post-list {
            list-style: none;
            margin-top: 16px;
        }
        .post-item {
            display: flex; align-items: center;
            gap: 12px;
            padding: 14px;
            background: var(--beyaz);
            border: 1.5px solid var(--orta-gri);
            border-radius: 12px;
            margin-bottom: 10px;
            transition: var(--gecis);
            position: relative;
        }
        .post-item.dragging {
            opacity: 0.5;
            transform: scale(0.98);
            box-shadow: var(--golge-guclu);
        }
        .post-item.drop-target {
            border-color: var(--canli-kirmizi);
            border-style: dashed;
            background: rgba(239,68,68,0.04);
        }

        .post-handle {
            color: var(--metin-acik);
            font-size: 1.2rem;
            cursor: grab;
            padding: 6px;
            user-select: none;
            touch-action: none;
        }
        .post-handle:active { cursor: grabbing; }

        .post-url {
            flex: 1;
            min-width: 0;
            font-size: 0.92rem;
            color: var(--metin-koyu);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .post-actions {
            display: flex;
            gap: 4px;
        }

        .post-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--metin-acik);
            background: var(--beyaz);
            border-radius: 12px;
            border: 1.5px dashed var(--orta-gri);
        }

        /* ============ BAŞARI INPUT'LARI ============ */
        .achievement-row {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--orta-gri);
        }
        .achievement-row:last-child { border-bottom: none; }
        .achievement-row .label {
            flex: 1;
            font-weight: 600;
            color: var(--metin-koyu);
            font-size: 0.95rem;
        }
        .achievement-row .num-input {
            width: 90px;
            padding: 10px 12px;
            text-align: center;
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--koyu-mavi);
            background: var(--acik-gri);
            border: 1.5px solid var(--orta-gri);
            border-radius: 8px;
        }
        .achievement-row .num-input:focus {
            outline: none;
            border-color: var(--canli-kirmizi);
            background: var(--beyaz);
        }

        .year-selector {
            display: flex; gap: 10px;
            align-items: stretch;
        }
        .year-selector select {
            flex: 1;
            padding: 12px 16px;
            background: var(--beyaz);
            border: 1.5px solid var(--orta-gri);
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            color: var(--koyu-mavi);
        }
        .year-selector .new-year-btn {
            padding: 12px 16px;
            background: var(--koyu-mavi);
            color: var(--beyaz);
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .year-selector .new-year-btn:hover { background: var(--koyu-mavi-2); }

        .checkbox-row {
            display: flex; align-items: flex-start;
            gap: 12px;
            padding: 16px;
            background: var(--acik-gri);
            border-radius: 10px;
            margin-top: 8px;
        }
        .checkbox-row input[type="checkbox"] {
            width: 22px; height: 22px;
            margin-top: 1px;
            accent-color: var(--canli-kirmizi);
            cursor: pointer;
        }
        .checkbox-row label {
            flex: 1;
            font-weight: 600;
            color: var(--metin-koyu);
            cursor: pointer;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        /* ============ TOAST ============ */
        .toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--koyu-mavi);
            color: var(--beyaz);
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: var(--golge-guclu);
            z-index: 999;
            opacity: 0;
            transition: all 0.3s;
            max-width: calc(100% - 32px);
            display: flex; align-items: center; gap: 10px;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--yesil); }
        .toast.error { background: var(--canli-kirmizi); }

        /* ============ MODAL ============ */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center; justify-content: center;
            z-index: 500;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--beyaz);
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: var(--golge-guclu);
        }
        .modal h3 {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--koyu-mavi);
            margin-bottom: 10px;
        }
        .modal p {
            color: var(--metin-koyu);
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }
        .modal-actions {
            display: flex; gap: 10px;
        }
        .modal-actions .btn {
            flex: 1;
        }

        /* ============ KAYDEDİLMEMİŞ DEĞİŞİKLİK BANNER ============ */
        .unsaved-banner {
            position: fixed; top: 60px; left: 0; right: 0;
            background: #fef3c7;
            color: #92400e;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            z-index: 90;
            display: none;
            border-bottom: 1px solid #fde68a;
        }
        .unsaved-banner.show { display: block; }
        body.has-banner .content { padding-top: 44px; }

        /* ============ RESPONSIVE ============ */
        @media (min-width: 768px) {
            .topbar-title { font-size: 1.15rem; }
            .content { padding: 32px 24px 60px; }
            .page-header h1 { font-size: 1.85rem; }
            .home-hero h1 { font-size: 2.5rem; }
            .card { padding: 24px; }
        }

        /* iOS Safari boşluk düzeltme */
        @supports (-webkit-touch-callout: none) {
            body { min-height: -webkit-fill-available; }
        }
    </style>
</head>
<body>

<!-- ============ LOGIN EKRANI ============ -->
<div id="login-screen">
    <div class="login-card">
        <h1>AKYAZI <span>SEGEM</span></h1>
        <p class="subtitle">Yönetim Paneli</p>
        <button class="login-btn" onclick="netlifyIdentity.open('login')">
            <i class="fas fa-lock" style="margin-right:8px;"></i>Giriş Yap
        </button>
        <p class="info">Bu panele yalnızca davet edilmiş kullanıcılar erişebilir.</p>
    </div>
</div>

<!-- ============ APP ============ -->
<div id="app">
    <header class="topbar">
        <button class="menu-toggle" onclick="openDrawer()" aria-label="Menü">
            <i class="fas fa-bars"></i>
        </button>
        <div class="topbar-title">Akyazı Çözüm Segem</div>
    </header>

    <div class="unsaved-banner" id="unsaved-banner">
        <i class="fas fa-exclamation-triangle"></i> Kaydedilmemiş değişiklikleriniz var
    </div>

    <main class="content" id="content">
        <!-- Dinamik içerik buraya -->
    </main>
</div>

<!-- ============ DRAWER ============ -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer">
    <div class="drawer-header">
        <div class="logo">AKYAZI <span>SEGEM</span></div>
        <button class="drawer-close" onclick="closeDrawer()" aria-label="Kapat">
            <i class="fas fa-times"></i>
        </button>
    </div>
    <nav class="drawer-menu">
        <button class="drawer-item home" data-page="home" onclick="navTo('home')">
            <i class="fas fa-home"></i>
            <span>Anasayfa</span>
        </button>
        <div class="drawer-divider"></div>
        <button class="drawer-item" data-page="gallery" onclick="navTo('gallery')">
            <i class="fab fa-instagram"></i>
            <span>Galeri</span>
        </button>
        <button class="drawer-item" data-page="achievements" onclick="navTo('achievements')">
            <i class="fas fa-trophy"></i>
            <span>Öğrenci Başarıları</span>
        </button>
        <button class="drawer-item" data-page="contact" onclick="navTo('contact')">
            <i class="fas fa-phone"></i>
            <span>İletişim</span>
        </button>
        <button class="drawer-item" data-page="video" onclick="navTo('video')">
            <i class="fas fa-video"></i>
            <span>Tanıtım Videosu</span>
        </button>
        <div class="drawer-spacer"></div>
        <div class="drawer-divider"></div>
        <button class="drawer-item logout" onclick="doLogout()">
            <i class="fas fa-sign-out-alt"></i>
            <span>Çıkış Yap</span>
        </button>
    </nav>
</aside>

<!-- ============ TOAST ============ -->
<div class="toast" id="toast"></div>

<!-- ============ MODAL ============ -->

<!-- Netlify Identity widget -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<script>
// =====================================================================
// AKYAZI SEGEM YÖNETİM PANELİ
// Tek HTML dosyası, vanilla JS, mobil-öncelikli, Netlify Identity + Git Gateway
// =====================================================================

const REPO = { owner: 'Mustafa-Yanar', repo: 'akyazisegem', branch: 'main' };

// State
const state = {
    user: null,
    currentPage: 'home',
    data: { gallery: null, achievements: null, config: null },
    sha: { gallery: null, achievements: null, config: null },
    dirty: false,
    pendingDirty: {} // hangi dosyalar değişti: {gallery: true, ...}
};

// =====================================================================
// AUTH (Netlify Identity)
// =====================================================================

netlifyIdentity.on('init', user => {
    if (user) onLogin(user);
});
netlifyIdentity.on('login', user => {
    onLogin(user);
    netlifyIdentity.close();
});
netlifyIdentity.on('logout', () => {
    state.user = null;
    document.body.classList.remove('logged-in');
});
netlifyIdentity.init();

async function onLogin(user) {
    state.user = user;
    document.body.classList.add('logged-in');
    showToast('Veriler yükleniyor...', '');
    try {
        await loadAllData();
        navTo('home');
    } catch (e) {
        showToast('Veri yüklenemedi: ' + e.message, 'error');
    }
}

function doLogout() {
    if (state.dirty) {
        confirmModal(
            'Kaydedilmemiş Değişiklikler',
            'Kaydedilmemiş değişiklikleriniz var. Yine de çıkmak istiyor musunuz?',
            (ok) => { if (ok) netlifyIdentity.logout(); }
        );
    } else {
        netlifyIdentity.logout();
    }
}

// =====================================================================
// GIT GATEWAY API
// =====================================================================

async function gitGet(path) {
    const token = state.user.token.access_token;
    const res = await fetch(`/.netlify/git/github/contents/${path}?ref=${REPO.branch}`, {
        headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!res.ok) throw new Error(`GET ${path} hatası: ${res.status}`);
    const json = await res.json();
    const content = decodeBase64Utf8(json.content);
    return { sha: json.sha, content };
}

async function gitPut(path, contentText, sha, commitMessage) {
    const token = state.user.token.access_token;
    const body = {
        message: commitMessage,
        content: encodeBase64Utf8(contentText),
        branch: REPO.branch
    };
    if (sha) body.sha = sha;
    const res = await fetch(`/.netlify/git/github/contents/${path}`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
    });
    if (!res.ok) {
        const err = await res.text();
        throw new Error(`PUT ${path} hatası: ${res.status} ${err}`);
    }
    const json = await res.json();
    return json.content.sha;
}

function encodeBase64Utf8(str) {
    return btoa(unescape(encodeURIComponent(str)));
}
function decodeBase64Utf8(b64) {
    return decodeURIComponent(escape(atob(b64.replace(/\n/g, ''))));
}

// =====================================================================
// VERİ YÜKLEME
// =====================================================================

async function loadAllData() {
    const [gallery, achievements, config] = await Promise.all([
        gitGet('gallery.json'),
        gitGet('achievements.json'),
        gitGet('config.json').catch(() => null) // config.json olmayabilir, sorun değil
    ]);
    state.data.gallery = JSON.parse(gallery.content);
    state.sha.gallery = gallery.sha;
    state.data.achievements = JSON.parse(achievements.content);
    state.sha.achievements = achievements.sha;
    if (config) {
        state.data.config = JSON.parse(config.content);
        state.sha.config = config.sha;
    } else {
        state.data.config = { contact: {}, video: {} };
    }
}

// =====================================================================
// KAYDETME
// =====================================================================

async function saveAll() {
    if (!state.dirty) return;
    const btn = document.getElementById('save-btn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Kaydediliyor...'; }
    try {
        if (state.pendingDirty.gallery) {
            const text = JSON.stringify(state.data.gallery, null, 2) + '\n';
            state.sha.gallery = await gitPut('gallery.json', text, state.sha.gallery, 'Galeri güncellendi');
        }
        if (state.pendingDirty.achievements) {
            const text = JSON.stringify(state.data.achievements, null, 2) + '\n';
            state.sha.achievements = await gitPut('achievements.json', text, state.sha.achievements, 'Başarılar güncellendi');
        }
        if (state.pendingDirty.config) {
            const text = JSON.stringify(state.data.config, null, 2) + '\n';
            state.sha.config = await gitPut('config.json', text, state.sha.config, 'Site bilgileri güncellendi');
        }
        state.dirty = false;
        state.pendingDirty = {};
        updateBanner();
        showToast('Kaydedildi ✓ Site 1-2 dakika içinde güncellenir', 'success');
    } catch (e) {
        showToast('Kaydedilemedi: ' + e.message, 'error');
    } finally {
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Kaydet'; }
    }
}

function markDirty(file) {
    state.dirty = true;
    state.pendingDirty[file] = true;
    updateBanner();
}

function updateBanner() {
    const banner = document.getElementById('unsaved-banner');
    if (state.dirty) {
        banner.classList.add('show');
        document.body.classList.add('has-banner');
    } else {
        banner.classList.remove('show');
        document.body.classList.remove('has-banner');
    }
}

// =====================================================================
// DRAWER
// =====================================================================

function openDrawer() {
    document.getElementById('drawer').classList.add('active');
    document.getElementById('drawer-overlay').classList.add('active');
}
function closeDrawer() {
    document.getElementById('drawer').classList.remove('active');
    document.getElementById('drawer-overlay').classList.remove('active');
}

// =====================================================================
// NAVİGASYON
// =====================================================================

function navTo(page) {
    if (state.dirty && state.currentPage !== page) {
        confirmModal(
            'Kaydedilmemiş Değişiklikler',
            'Kaydedilmemiş değişiklikleriniz var. Yine de geçmek istiyor musunuz?',
            (ok) => {
                if (ok) {
                    // Değişiklikleri at, taze datayı yeniden yükle
                    state.dirty = false;
                    state.pendingDirty = {};
                    updateBanner();
                    loadAllData().then(() => {
                        doNavTo(page);
                    });
                }
            }
        );
        return;
    }
    doNavTo(page);
}

function doNavTo(page) {
    state.currentPage = page;
    document.querySelectorAll('.drawer-item').forEach(el => {
        el.classList.toggle('active', el.dataset.page === page);
    });
    closeDrawer();
    const c = document.getElementById('content');
    c.innerHTML = '';
    if (page === 'home') renderHome(c);
    else if (page === 'gallery') renderGallery(c);
    else if (page === 'achievements') renderAchievements(c);
    else if (page === 'contact') renderContact(c);
    else if (page === 'video') renderVideo(c);
    window.scrollTo(0, 0);
}

// =====================================================================
// SAYFA: ANASAYFA
// =====================================================================

function renderHome(c) {
    const name = state.user?.user_metadata?.full_name || state.user?.email?.split('@')[0] || '';
    c.innerHTML = `
        <div class="home-hero">
            <h1>AKYAZI <span>SEGEM</span></h1>
            <p class="tag">Yönetim Paneli</p>
        </div>
        <div class="home-welcome">
            <h2>Hoşgeldiniz${name ? ', ' + escapeHtml(name) : ''}</h2>
            <p>Akyazı Çözüm Segem internet sitenizin yönetim paneline hoş geldiniz. Sol üstteki menü ikonundan düzenlemek istediğiniz bölümü seçebilirsiniz.</p>
            <ul>
                <li><i class="fab fa-instagram"></i><span>Galeri — Instagram gönderilerini yönet</span></li>
                <li><i class="fas fa-trophy"></i><span>Öğrenci Başarıları — Yıllık başarı sayıları</span></li>
                <li><i class="fas fa-phone"></i><span>İletişim — Telefon, adres, harita, sosyal medya</span></li>

            </ul>
        </div>

// =====================================================================
// SAYFA: GALERİ
// =====================================================================

function renderGallery(c) {
    c.innerHTML = `
        <div class="page-header">
            <h1>Galeri Postları</h1>
            <p class="subtitle">Instagram gönderilerini yönet</p>
        </div>
        <div class="card">
            <div class="card-title">Yeni Post Ekle</div>
            <div class="form-group">
                <input type="url" class="form-input" id="new-post-url" placeholder="https://www.instagram.com/p/..." />
                <p class="form-hint">Instagram'da postta sağ üst → "..." → "Bağlantıyı Kopyala" → buraya yapıştır.</p>
            </div>
            <button class="btn btn-primary btn-block" onclick="addGalleryPost()">
                <i class="fas fa-plus"></i> Post Ekle
            </button>
        </div>

        <div class="card">
            <div class="card-title">Mevcut Postlar (en yeni en üstte)</div>
            <ul class="post-list" id="post-list"></ul>
        </div>

        <div class="save-btn-wrapper">
            <button class="btn btn-primary btn-block" id="save-btn" onclick="saveAll()">
                <i class="fas fa-save"></i> Kaydet
            </button>
        </div>
    `;
    renderPostList();
}

function renderPostList() {
    const ul = document.getElementById('post-list');
    if (!ul) return;
    const posts = state.data.gallery.posts;
    if (posts.length === 0) {
        ul.innerHTML = '<li class="post-empty">Henüz post yok. Yukarıdan Instagram linki yapıştırarak ekleyebilirsin.</li>';
        return;
    }
    // Görüntü: en alttaki JSON öğesi en üstte (site reverse ediyor)
    const reversed = [...posts].map((p, i) => ({ ...p, _idx: i })).reverse();
    ul.innerHTML = reversed.map(p => `
        <li class="post-item" data-idx="${p._idx}" draggable="true">
            <span class="post-handle"><i class="fas fa-grip-vertical"></i></span>
            <span class="post-url">${escapeHtml(p.url)}</span>
            <div class="post-actions">
                <button class="btn-icon" onclick="moveUp(${p._idx})" aria-label="Yukarı"><i class="fas fa-arrow-up"></i></button>
                <button class="btn-icon" onclick="moveDown(${p._idx})" aria-label="Aşağı"><i class="fas fa-arrow-down"></i></button>
                <button class="btn-icon" onclick="deletePost(${p._idx})" aria-label="Sil" style="color:var(--canli-kirmizi);"><i class="fas fa-trash"></i></button>
            </div>
        </li>
    `).join('');
    setupDragDrop();
}

function addGalleryPost() {
    const input = document.getElementById('new-post-url');
    const url = input.value.trim();
    if (!url) {
        showToast('Lütfen bir Instagram linki yapıştırın', 'error');
        return;
    }
    if (!/^https:\/\/www\.instagram\.com\/(p|reel|tv)\/[A-Za-z0-9_-]+/.test(url)) {
        showToast('Geçerli bir Instagram post linki değil', 'error');
        return;
    }
    // En sona ekle (site .reverse() ile gösteriyor → kullanıcı en üstte görecek)
    state.data.gallery.posts.push({ url });
    input.value = '';
    markDirty('gallery');
    renderPostList();
    showToast('Post eklendi. Kaydet butonuna basmayı unutmayın.', '');
}

function deletePost(idx) {
    confirmModal(
        'Postu Sil',
        'Bu post silinsin mi?',
        (ok) => {
            if (!ok) return;
            state.data.gallery.posts.splice(idx, 1);
            markDirty('gallery');
            renderPostList();
        }
    );
}

// Site reverse ediyor → Görüntüde "yukarı" = JSON'da idx+1'e taşıma
function moveUp(idx) {
    const posts = state.data.gallery.posts;
    if (idx >= posts.length - 1) return; // Görüntüde zaten en üstte
    [posts[idx], posts[idx + 1]] = [posts[idx + 1], posts[idx]];
    markDirty('gallery');
    renderPostList();
}
function moveDown(idx) {
    const posts = state.data.gallery.posts;
    if (idx <= 0) return; // Görüntüde zaten en altta
    [posts[idx], posts[idx - 1]] = [posts[idx - 1], posts[idx]];
    markDirty('gallery');
    renderPostList();
}

// HTML5 Drag & Drop
function setupDragDrop() {
    const items = document.querySelectorAll('.post-item');
    let dragSrc = null;
    items.forEach(item => {
        item.addEventListener('dragstart', e => {
            dragSrc = item;
            item.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });
        item.addEventListener('dragend', () => {
            item.classList.remove('dragging');
            items.forEach(i => i.classList.remove('drop-target'));
        });
        item.addEventListener('dragover', e => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            if (item !== dragSrc) item.classList.add('drop-target');
        });
        item.addEventListener('dragleave', () => {
            item.classList.remove('drop-target');
        });
        item.addEventListener('drop', e => {
            e.preventDefault();
            if (item === dragSrc) return;
            const fromIdx = parseInt(dragSrc.dataset.idx);
            const toIdx = parseInt(item.dataset.idx);
            const posts = state.data.gallery.posts;
            const [moved] = posts.splice(fromIdx, 1);
            posts.splice(toIdx, 0, moved);
            markDirty('gallery');
            renderPostList();
        });
    });
}

// =====================================================================
// SAYFA: ÖĞRENCİ BAŞARILARI
// =====================================================================

function renderAchievements(c) {
    const data = state.data.achievements;
    const sortedYears = [...data.years].sort((a, b) => a.year.localeCompare(b.year));
    const currentYear = data.active_year || sortedYears[sortedYears.length - 1].year;

    c.innerHTML = `
        <div class="page-header">
            <h1>Öğrenci Başarıları</h1>
            <p class="subtitle">Yıllık başarı istatistiklerini güncelle</p>
        </div>

        <div class="card">
            <div class="form-label">Yıl Seç</div>
            <div class="year-selector">
                <select id="year-select" onchange="onYearChange()">
                    ${sortedYears.map(y => `<option value="${y.year}" ${y.year === currentYear ? 'selected' : ''}>${y.year}</option>`).join('')}
                </select>
                <button class="new-year-btn" onclick="addNewYear()"><i class="fas fa-plus"></i> Yeni Yıl</button>
            </div>
        </div>

        <div class="card" id="year-data-card">
            <!-- Yıl verileri buraya -->
        </div>

        <div style="margin-top:16px;">
            <button class="btn btn-danger btn-block" onclick="deleteCurrentYear()">
                <i class="fas fa-trash"></i> Bu Yılı Sil
            </button>
        </div>

        <div class="save-btn-wrapper">
            <button class="btn btn-primary btn-block" id="save-btn" onclick="saveAll()">
                <i class="fas fa-save"></i> Kaydet
            </button>
        </div>
    `;

    renderYearData(currentYear);
}

function renderYearData(year) {
    const card = document.getElementById('year-data-card');
    const yearObj = state.data.achievements.years.find(y => y.year === year);
    if (!yearObj) return;
    const isActive = state.data.achievements.active_year === year;

    const fields = [
        { key: 'fen_lisesi', label: 'Fen Lisesi' },
        { key: 'anadolu_lisesi', label: 'Anadolu Lisesi' },
        { key: 'sosyal_bilimler_lisesi', label: 'Sosyal Bilimler Lisesi' },
        { key: 'imam_hatip_lisesi', label: 'İmam Hatip Lisesi' },
        { key: 'meslek_lisesi', label: 'Meslek Lisesi' }
    ];
    const summary = [
        { key: 'toplam_yerlesme', label: 'Toplam Yerleşme' },
        { key: 'basari_orani', label: 'Başarı Oranı (%)', max: 100 }
    ];

    card.innerHTML = `
        <div class="card-title">${year} Yılı Verileri</div>
        ${fields.map(f => achievementRow(f, yearObj)).join('')}
        <div style="margin-top:16px;padding-top:16px;border-top:2px solid var(--orta-gri);">
            ${summary.map(f => achievementRow(f, yearObj)).join('')}
        </div>
        <div class="checkbox-row">
            <input type="checkbox" id="active-year-cb" ${isActive ? 'checked' : ''} onchange="toggleActiveYear(this, '${year}')">
            <label for="active-year-cb">Bu yılı sitede aktif olarak göster (ziyaretçiler bu yılı varsayılan görür)</label>
        </div>
    `;
}

function achievementRow(field, yearObj) {
    const max = field.max ? `max="${field.max}"` : '';
    return `
        <div class="achievement-row">
            <div class="label">${field.label}</div>
            <input type="number" class="num-input" inputmode="numeric" min="0" ${max}
                value="${yearObj[field.key]}"
                onchange="updateAchievementValue('${yearObj.year}', '${field.key}', this.value)" />
        </div>
    `;
}

function updateAchievementValue(year, key, value) {
    const yearObj = state.data.achievements.years.find(y => y.year === year);
    if (!yearObj) return;
    yearObj[key] = parseInt(value, 10) || 0;
    markDirty('achievements');
}

function onYearChange() {
    const year = document.getElementById('year-select').value;
    renderYearData(year);
}

function toggleActiveYear(cb, year) {
    if (cb.checked) {
        state.data.achievements.active_year = year;
    } else {
        // Boş bırakmak yerine en son yıla çevir
        const sorted = [...state.data.achievements.years].sort((a, b) => a.year.localeCompare(b.year));
        state.data.achievements.active_year = sorted[sorted.length - 1].year;
        cb.checked = state.data.achievements.active_year === year;
    }
    markDirty('achievements');
}

function addNewYear() {
    const existing = state.data.achievements.years.map(y => parseInt(y.year));
    const maxYear = Math.max(...existing);
    const newYear = String(maxYear + 1);
    state.data.achievements.years.push({
        year: newYear,
        fen_lisesi: 0, anadolu_lisesi: 0, sosyal_bilimler_lisesi: 0,
        imam_hatip_lisesi: 0, meslek_lisesi: 0,
        toplam_yerlesme: 0, basari_orani: 0
    });
    markDirty('achievements');
    renderAchievements(document.getElementById('content'));
    setTimeout(() => {
        const sel = document.getElementById('year-select');
        if (sel) { sel.value = newYear; renderYearData(newYear); }
    }, 0);
    showToast(newYear + ' yılı eklendi', 'success');
}

function deleteCurrentYear() {
    const year = document.getElementById('year-select').value;
    confirmModal(
        'Yılı Sil',
        `${year} yılı tüm verileriyle silinsin mi? Bu işlem geri alınamaz.`,
        (ok) => {
            if (!ok) return;
            const idx = state.data.achievements.years.findIndex(y => y.year === year);
            if (idx === -1) return;
            state.data.achievements.years.splice(idx, 1);
            // Aktif yıl silindiyse en son yıla çevir
            if (state.data.achievements.active_year === year) {
                const sorted = [...state.data.achievements.years].sort((a, b) => a.year.localeCompare(b.year));
                state.data.achievements.active_year = sorted.length ? sorted[sorted.length - 1].year : '';
            }
            markDirty('achievements');
            renderAchievements(document.getElementById('content'));
            showToast(year + ' yılı silindi', 'success');
        }
    );
}

                <i class="fas fa-save"></i> Kaydet
            </button>
        </div>
    `;
}

function updateContact(input) {
    if (!state.data.config.contact) state.data.config.contact = {};
    state.data.config.contact[input.dataset.cfg] = input.value;
    markDirty('config');
}

async function saveContactAndPersist() {
    // iframe doğrulama
    const iframe = state.data.config.contact?.map_iframe || '';
    if (iframe && !/^<iframe[^>]+src=["']https:\/\/www\.google\.com\/maps\/embed\?[^"']+["'][^>]*>\s*<\/iframe>\s*$/i.test(iframe.trim())) {
        showToast('Harita kodu geçerli bir Google Maps embed kodu değil', 'error');
        return;
    }
    await saveAll();
}

// =====================================================================
// SAYFA: TANITIM VİDEOSU
// =====================================================================

function renderVideo(c) {
    const v = state.data.config.video || {};
    c.innerHTML = `
        <div class="page-header">
            <h1>Tanıtım Videosu</h1>
            <p class="subtitle">Video bölümü başlığı</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label class="form-label">Bölüm Başlığı</label>

                <p class="form-hint">Sitede video bölümünün üstünde gösterilecek başlık.</p>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Video ve Poster Dosyaları</div>
            <p class="form-hint" style="margin-bottom:14px;">
                <i class="fas fa-info-circle"></i> Video dosyası ve poster görseli teknik destek tarafından yüklenir. Yüklenmesini istediğiniz dosyayı bize iletin.
            </p>
            <div class="achievement-row">
                <div class="label"><i class="fas fa-film"></i> Mevcut video dosyası</div>
                <div style="font-family:monospace;font-size:0.85rem;color:var(--metin-acik);">${escapeHtml(v.file || '—')}</div>

            <div class="achievement-row">
                <div class="label"><i class="fas fa-image"></i> Mevcut poster</div>
                <div style="font-family:monospace;font-size:0.85rem;color:var(--metin-acik);">${escapeHtml(v.poster || '—')}</div>

            <button class="btn btn-primary btn-block" id="save-btn" onclick="saveAll()">
                <i class="fas fa-save"></i> Kaydet

        </div>
    `;
}

function updateVideoTitle(input) {
    if (!state.data.config.video) state.data.config.video = {};
    state.data.config.video.title = input.value;
    markDirty('config');
}

// =====================================================================
// MODAL & TOAST
// =====================================================================

let modalCallback = null;
function confirmModal(title, message, callback) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-message').textContent = message;
    document.getElementById('modal-overlay').classList.add('active');
    modalCallback = callback;
}
function closeModal(result) {
    document.getElementById('modal-overlay').classList.remove('active');
    if (modalCallback) modalCallback(result);
    modalCallback = null;
}

let toastTimer = null;
function showToast(message, type = '') {
    const t = document.getElementById('toast');
    t.className = 'toast ' + type;
    t.innerHTML = (type === 'success' ? '<i class="fas fa-check-circle"></i>' :
                   type === 'error' ? '<i class="fas fa-exclamation-circle"></i>' : '') +
                  ' <span>' + escapeHtml(message) + '</span>';
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

// =====================================================================
// HELPERS
// =====================================================================

function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

// Sayfayı kapatmadan önce uyarı
window.addEventListener('beforeunload', e => {
    if (state.dirty) {
        e.preventDefault();
        e.returnValue = '';
    }
});

// Davet/recovery token'ı yakalama (ana sayfadan yönlendirme için)
// Not: index.html zaten /admin/'e yönlendiriyor, Netlify Identity widget hash'i tüketir
</script>
